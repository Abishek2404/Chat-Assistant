<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="RAG chat assistant">
        <header class="chat-header">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true">
              <img src="assets/assistant-logo.png" alt="" />
            </span>
            <div>
              <h1>Chat Assistant</h1>
            </div>
          </div>
          <button id="new-chat" class="ghost-button" type="button">New Chat</button>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="bubble">
              Ask me about account security, billing, onboarding, data export, or support policies.
            </div>
          </article>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-field">
            <label class="sr-only" for="message-input">Message</label>
            <textarea
              id="message-input"
              name="message"
              rows="1"
              placeholder="Ask a question from the knowledge base..."
              autocomplete="off"
              required
            ></textarea>
          </div>
          <button id="send-button" type="submit">Send</button>
        </form>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
